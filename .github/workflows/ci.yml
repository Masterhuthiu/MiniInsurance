name: Build, Test and Push Image

on: [push, pull_request]

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    services:
      postgres-db:
        image: postgres:latest
        env:
          POSTGRES_USER: postgres
          POSTGRES_HOST_AUTH_METHOD: trust 
          POSTGRES_DB: insurandb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Bước 1: Build Image (Dùng tên viết thường hoàn toàn)
      - name: Build Docker Image
        run: |
          docker build -t ghcr.io/masterhuthiu/miniinsurance:latest .

      # Bước 2: Chạy Test (Cũng dùng tên viết thường)
      - name: Run and Verify
        run: |
          docker run --network host \
            -e PGHOST=localhost -e PGUSER=postgres -e PGDATABASE=insurandb \
            ghcr.io/masterhuthiu/miniinsurance:latest bash -c "
              # ... (các lệnh test của bạn)
            "

      # Bước 3: Push (Tên viết thường)
      - name: Push Docker Image
        run: |
          docker push ghcr.io/masterhuthiu/miniinsurance:latest