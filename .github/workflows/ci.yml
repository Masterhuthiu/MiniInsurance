name: Build, Test and Push Image

on: [push, pull_request]

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    services:
      postgres-db:
        image: postgres:latest
        env:
          POSTGRES_USER: postgres
          POSTGRES_HOST_AUTH_METHOD: trust 
          POSTGRES_DB: insurandb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Bước 1: Build Image (Lúc này ocesql đã được cài vào bên trong image nhờ Dockerfile)
      - name: Build Docker Image
        run: |
          docker build -t ghcr.io/${{ github.repository }}:latest .

      # Bước 2: Chạy Test ngay trên Image vừa build
      - name: Run and Verify
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: postgres
          PGDATABASE: insurandb
        run: |
          docker run --network host \
            -e PGHOST=$PGHOST -e PGUSER=$PGUSER -e PGDATABASE=$PGDATABASE \
            ghcr.io/${{ github.repository }}:latest bash -c "
              echo '--- Initializing DB ---' &&
              psql -h localhost -U postgres -d insurandb -f db/init.sql &&
              echo '--- Compiling COBOL ---' &&
              ocesql FETCHTBL.cbl FETCHTBL.cob &&
              cobc -x -fixed FETCHTBL.cob /usr/local/lib/libocesql.so -lpq -o FETCHTBL &&
              echo '--- Running Test ---' &&
              ./FETCHTBL
            "

      # Bước 3: Nếu test pass thì mới Push lên Registry
      - name: Push Docker Image
        run: |
          docker push ghcr.io/${{ github.repository }}:latest