name: Build, Test and Push Image

on: [push, pull_request]

# Cần quyền này để ghi package vào GitHub Container Registry (GHCR)
permissions:
  contents: read
  packages: write

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    services:
      postgres-db:
        image: postgres:latest
        env:
          POSTGRES_USER: postgres
          POSTGRES_HOST_AUTH_METHOD: trust 
          POSTGRES_DB: insurandb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gnucobol libpq-dev git make gcc autoconf libtool

      - name: Build and Install Open-COBOL-ESQL
        run: |
          git clone https://github.com/opensourcecobol/Open-COBOL-ESQL.git
          cd Open-COBOL-ESQL
          ./autogen.sh
          ./configure
          make
          sudo make install
          sudo ldconfig

      - name: Initialize Database
        run: |
          psql -h localhost -U postgres -d insurandb -f db/init.sql

      - name: Build Apps (FETCHTBL & FETCH-POLICY)
        run: |
          # Build FETCHTBL
          ocesql FETCHTBL.cbl FETCHTBL.cob
          cp /usr/local/lib/libocesql.so ./OCESQLConnect.so
          cp /usr/local/lib/libocesql.so ./OCESQL.so
          cobc -x -fixed -I. FETCHTBL.cob /usr/local/lib/libocesql.so -lpq -o FETCHTBL
          
          # Build FETCH-POLICY
          ocesql src/FETCH-POLICY.cbl src/FETCH-POLICY.cob
          # (Các file .so đã copy ở trên dùng chung được)
          cobc -x -fixed -I. src/FETCH-POLICY.cob /usr/local/lib/libocesql.so -lpq -o FETCH-POLICY

      - name: Run and Verify
        env:
          LD_LIBRARY_PATH: .:/usr/local/lib:$LD_LIBRARY_PATH
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: postgres
          PGDATABASE: insurandb
        run: |
          echo "--- KET QUA BANG EMP (FETCHTBL) ---"
          ./FETCHTBL
          echo ""
          echo "--- KET QUA BANG POLICIES (FETCH-POLICY) ---"
          ./FETCH-POLICY

      # --- BƯỚC MỚI: PUSH DOCKER IMAGE ---

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          # Tên image sẽ là: ghcr.io/tên-user/tên-repo:latest
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}