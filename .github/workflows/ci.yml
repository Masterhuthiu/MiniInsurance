name: CI-CD Ready-To-Run

on:
  push:
    branches: [ main, master ]

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        run: |
          # Tự động lấy tên Repo và chuyển thành chữ thường (lowercase)
          RAW_IMAGE_NAME="ghcr.io/${{ github.repository_owner }}/miniinsurance"
          LOWER_IMAGE_NAME=$(echo $RAW_IMAGE_NAME | tr '[A-Z]' '[a-z]')
          
          echo "Building image: $LOWER_IMAGE_NAME"
          
          docker build -t $LOWER_IMAGE_NAME:latest .
          docker push $LOWER_IMAGE_NAME:latest